# NeuraBot Configuration
# Copy this file to config/config.yaml and edit for your hardware

# ---- Communication ----
comm:
  motion_port:  "/dev/ttyUSB0"   # ESP32 Motion serial port
  periph_port:  "/dev/ttyUSB1"   # ESP32 Peripherals serial port
  baud_rate:    115200
  timeout:      0.1

# ---- Gait / IK ----
gait:
  default_height: 0.15   # Body height in meters (0.08 – 0.22)
  default_speed:  1.0    # Gait speed multiplier
  leg:
    hip_offset:  0.045   # Lateral hip-to-body offset (m)
    thigh_len:   0.10    # Upper leg length (m)
    shin_len:    0.10    # Lower leg length (m)

# ---- Vision AI ----
vision:
  camera_index:          0
  model_path:            "yolov8n.pt"     # or "yolov8s.pt" for more accuracy
  confidence_threshold:  0.45
  image_size:            640
  target_fps:            15

# ---- Speech AI ----
speech:
  sample_rate:    16000
  chunk_duration: 3.0     # seconds per audio chunk
  mic_device:     null    # null = default microphone
  wake_word:      "neura"
  whisper_model:  "base"  # tiny / base / small / medium
  tts_model:      "tts_models/en/ljspeech/tacotron2-DDC"

# ---- Power ----
power:
  main_i2c_addr:     0x40
  logic_i2c_addr:    0x41
  main_shunt_ohms:   0.1
  logic_shunt_ohms:  0.1
  main_max_amps:     10.0
  logic_max_amps:    3.0

# ---- Web Server ----
web:
  host: "0.0.0.0"
  port: 5000
